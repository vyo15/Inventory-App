name: IMS Quality Gate

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Verify Node.js runtime
        run: npm run check:runtime

      - name: Install backend dependencies
        run: npm ci --prefix backend

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Verify source hygiene
        run: npm run verify:source

      - name: Test root scripts
        run: npm run test:scripts

      - name: Check backend syntax and lint
        run: npm --prefix backend run check

      - name: Test backend
        run: npm --prefix backend test

      - name: Test frontend
        run: npm --prefix frontend test

      - name: Check frontend critical-flow coverage
        run: npm --prefix frontend run test:coverage

      - name: Lint frontend
        run: npm --prefix frontend run lint

      - name: Build frontend
        run: npm --prefix frontend run build

      - name: Check frontend bundle budget
        run: npm run check:bundle

      - name: Generate CycloneDX SBOM
        run: npm run sbom

      - name: Upload coverage and SBOM evidence
        uses: actions/upload-artifact@v4
        with:
          name: ims-quality-evidence
          path: |
            frontend/coverage/coverage-summary.json
            .artifacts/sbom/*.json
          if-no-files-found: error
